<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>QR SCANNER PRO v29</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        :root { --safe-area-bottom: env(safe-area-inset-bottom); }
        body { margin: 0; font-family: -apple-system, sans-serif; background: #000; color: #fff; display: flex; flex-direction: column; min-height: 100vh; overflow: hidden; }
        body.ok { background:#28a745 !important; }
        body.ng { background:#dc3545 !important; }

        /* ★判定表示をさらに巨大化 (OK/NG) */
        #status-display { font-size: 6rem; font-weight: 900; margin: 0; padding: 10px 0; height: 1.2em; text-shadow: 3px 3px 6px rgba(0,0,0,0.7); line-height: 1; }
        
        /* カメラ映像 */
        .video-container { width: 85%; max-width: 380px; aspect-ratio: 1 / 1; border: 3px solid #fff; border-radius: 15px; overflow: hidden; margin: 0 auto; background: #222; }
        #canvas { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        
        /* ★「生産中」パネルを巨大化 */
        .info-panel { margin: 10px 12px; padding: 15px; background: rgba(255,255,255,0.25); border-radius: 12px; border: 2px solid #fff; }
        #target-info { font-size: 2.2rem; font-weight: 900; color: #fff; text-shadow: 1px 1px 3px #000; overflow-wrap: break-word; }
        .info-label { font-size: 0.9rem; opacity: 0.8; margin-bottom: 5px; }

        /* マスター選択 */
        .master-panel { background:#f4f7f9; color:#333; padding: 8px 15px; border-radius: 20px 20px 0 0; }
        #master-select { width: 100%; padding: 12px; font-size: 1.1rem; border-radius: 8px; border: 1px solid #ccc; font-weight: bold; }

        /* ★ログの表示数を半分に（高さを制限） */
        .log-display-area { background: #fff; color: #333; height: 120px; overflow-y: hidden; text-align: left; padding: 5px 15px; font-size: 1rem; }
        .log-item { padding: 6px 0; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; font-weight: bold; }

        /* 下部ボタン */
        .btn-group { background:#fff; padding: 10px 12px calc(10px + var(--safe-area-bottom)); display:grid; grid-template-columns: 1fr 1fr 1fr; gap:10px; border-top: 1px solid #ddd; }
        button { padding: 12px; border-radius: 10px; border: none; font-weight: bold; cursor: pointer; font-size: 0.9rem; }
        .btn-main { background:#007bff; color:white; }
        .btn-sub { background:#555; color:white; }
        
        #start-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:#111; display:flex; justify-content:center; align-items:center; z-index:2000; font-size:1.5rem; text-align:center; }
        .modal { position:fixed; top:0; left:0; width:100%; height:100%; display:none; flex-direction:column; background:#fff; z-index:5000; color:#333; }
        #mini-canvas { width: 100%; max-width: 200px; transform: scaleX(-1); border-radius: 10px; border: 2px solid #000; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div id="start-overlay" onclick="startApp()">タップして開始</div>
    
    <div id="status-display">READY</div>
    
    <div class="video-container"><canvas id="canvas"></canvas></div>
    
    <div class="info-panel">
        <div class="info-label">▼ 現在の照合マスター</div>
        <div id="target-info">未選択</div>
    </div>

    <div class="master-panel">
        <select id="master-select" onchange="selectMasterFromPullDown()">
            <option value="">-- 切り替えはこちら --</option>
        </select>
    </div>

    <div class="log-display-area" id="recent-logs"></div>

    <div class="btn-group">
        <button class="btn-main" onclick="toggleModal('mgmt-modal')">⚙ 設定</button>
        <button class="btn-sub" onclick="toggleModal('log-modal')">📊 集計</button>
        <button class="btn-sub" onclick="finishProduction()" style="background:#b40000;">■ 終了</button>
    </div>

    <div id="mgmt-modal" class="modal">
        <div style="padding:20px; flex-grow:1; overflow-y:auto;">
            <h3>マスター管理</h3>
            <div style="padding:15px;background:#eee;border-radius:12px;text-align:center;margin-bottom:15px;">
                <canvas id="mini-canvas"></canvas>
                <button class="btn-main" style="width:100%;" onclick="registerNew()">今のQRを登録</button>
            </div>
            <div id="edit-list"></div>
        </div>
        <div style="padding:15px;"><button class="btn-sub" style="width:100%;" onclick="toggleModal('mgmt-modal')">閉じる</button></div>
    </div>

    <div id="log-modal" class="modal">
        <div style="padding:20px; flex-grow:1; overflow-y:auto;">
            <h3>詳細履歴</h3>
            <div id="summary-area" style="background:#eef6ff;padding:15px;border-radius:12px;margin-bottom:15px;"><div id="summary-list"></div></div>
            <div id="full-log-list"></div>
        </div>
        <div style="padding:15px; border-top:1px solid #eee;">
            <button onclick="exportCSV()" style="width:100%;background:#008800;color:white;padding:14px;border-radius:10px;margin-bottom:10px;">📤 CSV出力</button>
            <button class="btn-sub" style="width:100%;" onclick="toggleModal('log-modal')">閉じる</button>
        </div>
    </div>

<script>
const video = document.createElement("video");
const canvasElement = document.getElementById("canvas");
const canvas = canvasElement.getContext("2d", { willReadFrequently: true });
const miniCanvasElement = document.getElementById("mini-canvas");
const miniCanvas = miniCanvasElement ? miniCanvasElement.getContext("2d") : null;

let audioCtx;
function playBeep(type) {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === "suspended") audioCtx.resume();
    const now = audioCtx.currentTime;
    if (type === "ok") {
        const osc = audioCtx.createOscillator();
        const gain = audioCtx.createGain();
        osc.frequency.setValueAtTime(880, now);
        osc.frequency.exponentialRampToValueAtTime(698, now + 0.15);
        gain.gain.setValueAtTime(0.3, now);
        osc.connect(gain); gain.connect(audioCtx.destination);
        osc.start(now); osc.stop(now + 0.5);
    } else {
        [140, 175, 225].forEach(f => {
            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.type = 'square';
            osc.frequency.setValueAtTime(f, now);
            gain.gain.setValueAtTime(0.4, now);
            osc.connect(gain); gain.connect(audioCtx.destination);
            osc.start(now); osc.stop(now + 0.6);
        });
    }
}

let masters = JSON.parse(localStorage.getItem("kb_v19_masters")) || [];
let logs = JSON.parse(localStorage.getItem("kb_v19_logs")) || [];
let activeMaster = null;
let currentQR = "";
let isProcessing = false;
let lastSeenQR = "";
let seenCount = 0;

function startApp() {
    document.getElementById("start-overlay").style.display = "none";
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "user", width: 1280, height: 1280 } }).then(s => {
        video.srcObject = s; video.setAttribute("playsinline", true); video.play();
        requestAnimationFrame(tick);
    });
}

function tick() {
    if (video.readyState === video.HAVE_ENOUGH_DATA) {
        canvasElement.width = video.videoWidth; canvasElement.height = video.videoHeight;
        canvas.drawImage(video, 0, 0, canvasElement.width, canvasElement.height);
        if (document.getElementById('mgmt-modal').style.display === 'flex' && miniCanvasElement) {
            miniCanvasElement.width = 320; miniCanvasElement.height = 320;
            miniCanvas.drawImage(video, 0, 0, 320, 320);
        }
        const img = canvas.getImageData(0, 0, canvasElement.width, canvasElement.height);
        const code = jsQR(img.data, img.width, img.height, { inversionAttempts: "dontInvert" });
        if (code && code.data.trim() !== "") {
            if (code.data === lastSeenQR) { seenCount++; } else { lastSeenQR = code.data; seenCount = 1; }
            if (seenCount >= 2) {
                currentQR = code.data;
                if (!isProcessing && activeMaster && document.getElementById("mgmt-modal").style.display !== "flex") {
                    isProcessing = true;
                    const ok = (currentQR === activeMaster.code);
                    playBeep(ok ? "ok" : "ng");
                    updateStatus(ok);
                    saveLog(ok ? "OK" : "NG");
                    seenCount = 0; lastSeenQR = "";
                }
            }
        } else { seenCount = 0; lastSeenQR = ""; }
    }
    requestAnimationFrame(tick);
}

function updateStatus(ok) {
    document.body.className = ok ? "ok" : "ng";
    document.getElementById("status-display").innerText = ok ? "OK" : "NG";
    setTimeout(() => {
        document.body.className = "";
        document.getElementById("status-display").innerText = "READY";
        isProcessing = false;
    }, 1200);
}

function saveLog(res) {
    const now = new Date();
    logs.push({ time: now.toLocaleTimeString([], {hour:"2-digit", minute:"2-digit", second:"2-digit"}), master: activeMaster.name, result: res, date: now.toLocaleDateString() });
    localStorage.setItem("kb_v19_logs", JSON.stringify(logs));
    renderRecentLogs();
}

function selectMasterFromPullDown() {
    const val = document.getElementById("master-select").value;
    activeMaster = (val === "") ? null : masters[parseInt(val)];
    document.getElementById("target-info").innerText = activeMaster ? activeMaster.name : "未選択";
}

function renderMasters() {
    let options = '<option value="">-- 切り替えはこちら --</option>';
    options += masters.map((m, i) => `<option value="${i}" ${activeMaster && activeMaster.code === m.code ? "selected" : ""}>${m.name}</option>`).join("");
    document.getElementById("master-select").innerHTML = options;
}

function registerNew() {
    if (!currentQR) return alert("QRが認識されていません。");
    const name = prompt("製品名を入力:");
    if (name) { masters.push({name: name, code: currentQR}); saveMasters(); }
}

function saveMasters() {
    localStorage.setItem("kb_v19_masters", JSON.stringify(masters));
    renderMasters(); renderEditList();
}

function renderEditList() {
    document.getElementById("edit-list").innerHTML = masters.map((m, i) => `
        <div style="border-bottom:1px solid #ddd; padding:10px;"><b>${m.name}</b> <button onclick="deleteMaster(${i})" style="color:red; background:none; border:none; float:right;">削除</button></div>
    `).join("");
}

function deleteMaster(i) { if (confirm("削除？")) { masters.splice(i,1); saveMasters(); } }

function renderRecentLogs() {
    const recent = logs.slice(-5).reverse();
    document.getElementById("recent-logs").innerHTML = recent.map(l => `
        <div class="log-item"><span><b style="color:${l.result==='OK'?'#28a745':'#dc3545'}">[${l.result}]</b> ${l.time}</span><span>${l.master}</span></div>
    `).join("") || '<div style="color:#999; text-align:center; padding:20px;">履歴なし</div>';
}

function toggleModal(id) {
    const m = document.getElementById(id);
    m.style.display = (m.style.display === "flex") ? "none" : "flex";
    if (id === "log-modal") {
        const okCount = logs.filter(l => l.result === "OK").length;
        document.getElementById("summary-list").innerHTML = `<b>総OK：${okCount}件</b>`;
        document.getElementById("full-log-list").innerHTML = logs.slice().reverse().map(l => `<div class="log-item"><span>[${l.result}] ${l.time}</span><span>${l.master}</span></div>`).join("");
    }
}

function exportCSV() {
    let csv = "日付,時間,マスター名,結果\n";
    logs.forEach(l => { csv += `${l.date},${l.time},${l.master},${l.result}\n`; });
    const blob = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csv], { type: "text/csv" });
    const a = document.createElement("a"); a.href = URL.createObjectURL(blob); a.download = `logs.csv`; a.click();
}

renderMasters(); renderEditList(); renderRecentLogs();
</script>
</body>
</html>
