<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>QR SCANNER PRO v32</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        :root { --safe-area-bottom: env(safe-area-inset-bottom); }
        body { margin: 0; font-family: -apple-system, sans-serif; background: #000; color: #fff; display: flex; flex-direction: column; min-height: 100vh; overflow: hidden; }
        body.ok { background:#28a745 !important; }
        body.ng { background:#dc3545 !important; }

        /* ★判定表示をさらに巨大化 (OK/NG) */
        #status-display { font-size: 8rem; font-weight: 900; margin: 0; padding: 0; height: 1.1em; text-shadow: 4px 4px 8px rgba(0,0,0,0.8); text-align: center; line-height: 1.1; }
        
        /* カメラプレビュー */
        .video-container { width: 80%; max-width: 340px; aspect-ratio: 1 / 1; border: 4px solid #fff; border-radius: 20px; overflow: hidden; margin: 0 auto; background: #222; }
        #canvas { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        
        /* ★「生産中の製品」パネルを極大化 */
        .info-panel { margin: 12px; padding: 20px; background: rgba(255,255,255,0.25); border-radius: 15px; border: 3px solid #fff; text-align: center; }
        .info-label { font-size: 1.2rem; margin-bottom: 8px; font-weight: bold; color: #eee; }
        #target-info { font-size: 3.5rem; font-weight: 900; line-height: 1.1; word-break: break-all; color: #fff; text-shadow: 2px 2px 5px #000; }

        /* マスター変更プルダウン */
        .master-panel { background:#f4f7f9; color:#333; padding: 12px 15px; border-radius: 25px 25px 0 0; }
        #master-select { width: 100%; padding: 15px; font-size: 1.3rem; border-radius: 12px; border: 2px solid #ccc; font-weight: bold; background: #fff; appearance: none; text-align: center; }

        /* ログエリア */
        .log-display-area { background: #fff; color: #333; height: 100px; overflow-y: hidden; padding: 5px 20px; border-bottom: 1px solid #ddd; }
        .log-item { padding: 10px 0; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; font-weight: bold; font-size: 1.1rem; }

        /* ★ボタンを大きく押しやすく */
        .btn-group { background:#fff; padding: 15px 15px calc(15px + var(--safe-area-bottom)); display:grid; grid-template-columns: 1fr 1fr 1fr; gap:12px; }
        button { padding: 22px 10px; border-radius: 15px; border: none; font-weight: 900; cursor: pointer; font-size: 1.1rem; box-shadow: 0 4px 0 rgba(0,0,0,0.2); }
        button:active { transform: translateY(2px); box-shadow: none; }
        .btn-main { background:#007bff; color:white; }
        .btn-sub { background:#555; color:white; }
        
        #start-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:#111; display:flex; justify-content:center; align-items:center; z-index:9999; font-size:2rem; font-weight:bold; }
        .modal { position:fixed; top:0; left:0; width:100%; height:100%; display:none; flex-direction:column; background:#fff; z-index:5000; color:#333; }
        .modal-content { padding: 25px; flex-grow: 1; overflow-y: auto; }
    </style>
</head>
<body>
    <div id="start-overlay" onclick="startApp()">タップして開始</div>
    <div id="status-display">READY</div>
    <div class="video-container"><canvas id="canvas"></canvas></div>
    
    <div class="info-panel">
        <div class="info-label">生産中の製品</div>
        <div id="target-info">未選択</div>
    </div>

    <div class="master-panel">
        <select id="master-select" onchange="selectMasterFromPullDown()">
            <option value="" disabled selected>▼ マスター変更</option>
        </select>
    </div>

    <div class="log-display-area" id="recent-logs"></div>

    <div class="btn-group">
        <button class="btn-main" onclick="toggleModal('mgmt-modal')">⚙ 設定</button>
        <button class="btn-sub" onclick="toggleModal('log-modal')">📊 集計</button>
        <button class="btn-sub" onclick="finishProduction()" style="background:#b40000;">■ 終了</button>
    </div>

    <div id="mgmt-modal" class="modal">
        <div class="modal-content">
            <h2>マスター登録・削除</h2>
            <div style="padding:20px;background:#eee;border-radius:15px;text-align:center;margin-bottom:20px;">
                <canvas id="mini-canvas" style="width:100%;max-width:260px;transform:scaleX(-1);border-radius:10px;"></canvas>
                <button class="btn-main" style="width:100%; margin-top:10px;" onclick="registerNew()">今のQRを登録</button>
            </div>
            <div id="edit-list"></div>
        </div>
        <div style="padding:20px;"><button class="btn-sub" style="width:100%; padding:20px;" onclick="toggleModal('mgmt-modal')">閉じる</button></div>
    </div>

    <div id="log-modal" class="modal">
        <div class="modal-content">
            <h2>判定集計・履歴</h2>
            <div id="summary-dashboard" style="background:#eef6ff;padding:15px;border-radius:12px;margin-bottom:20px;"></div>
            <div id="full-log-list"></div>
        </div>
        <div style="padding:20px;">
            <button onclick="exportCSV()" style="width:100%;background:#008800;color:white;padding:18px;border-radius:10px;margin-bottom:12px; font-weight:bold;">📤 CSV出力</button>
            <button onclick="clearLogs()" style="width:100%;background:none;color:red;border:2px solid red;padding:15px;border-radius:10px;margin-bottom:12px; font-weight:bold;">⚠️ 履歴リセット</button>
            <button class="btn-sub" style="width:100%; padding:18px;" onclick="toggleModal('log-modal')">閉じる</button>
        </div>
    </div>

<script>
const video = document.createElement("video");
const canvasElement = document.getElementById("canvas");
const canvas = canvasElement.getContext("2d", { willReadFrequently: true });
let audioCtx;

function playBeep(type) {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === "suspended") audioCtx.resume();
    const now = audioCtx.currentTime;
    if (type === "ok") {
        const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
        o.frequency.setValueAtTime(880, now); o.frequency.exponentialRampToValueAtTime(698, now+0.15);
        g.gain.setValueAtTime(0.3, now); o.connect(g); g.connect(audioCtx.destination);
        o.start(now); o.stop(now+0.5);
    } else {
        [140, 175, 225].forEach(f => {
            const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
            o.type='square'; o.frequency.setValueAtTime(f, now);
            g.gain.setValueAtTime(0.4, now); o.connect(g); g.connect(audioCtx.destination);
            o.start(now); o.stop(now+0.6);
        });
    }
}

let masters = JSON.parse(localStorage.getItem("kb_v19_masters")) || [];
let logs = JSON.parse(localStorage.getItem("kb_v19_logs")) || [];
let activeMaster = null;
let isProcessing = false;
let lastSeenQR = "";
let seenCount = 0;

function startApp() {
    document.getElementById("start-overlay").style.display = "none";
    navigator.mediaDevices.getUserMedia({ video: { facingMode: "user", width: 1280, height: 1280 } }).then(s => {
        video.srcObject = s; video.setAttribute("playsinline", true); video.play();
        requestAnimationFrame(tick);
    });
}

function tick() {
    if (video.readyState === video.HAVE_ENOUGH_DATA) {
        canvasElement.width = video.videoWidth; canvasElement.height = video.videoHeight;
        canvas.drawImage(video, 0, 0, canvasElement.width, canvasElement.height);
        const img = canvas.getImageData(0, 0, canvasElement.width, canvasElement.height);
        const code = jsQR(img.data, img.width, img.height, { inversionAttempts: "dontInvert" });
        if (code && code.data.trim() !== "") {
            if (code.data === lastSeenQR) { seenCount++; } else { lastSeenQR = code.data; seenCount = 1; }
            if (seenCount >= 2) {
                if (!isProcessing && activeMaster && document.getElementById("mgmt-modal").style.display !== "flex") {
                    isProcessing = true;
                    const ok = (code.data === activeMaster.code);
                    playBeep(ok ? "ok" : "ng");
                    updateStatus(ok);
                    saveLog(ok ? "OK" : "NG");
                    seenCount = 0; lastSeenQR = "";
                }
            }
        } else { seenCount = 0; lastSeenQR = ""; }
    }
    requestAnimationFrame(tick);
}

function updateStatus(ok) {
    document.body.className = ok ? "ok" : "ng";
    document.getElementById("status-display").innerText = ok ? "OK" : "NG";
    setTimeout(() => { document.body.className = ""; document.getElementById("status-display").innerText = "READY"; isProcessing = false; }, 1200);
}

function saveLog(res) {
    const now = new Date();
    logs.push({ date: now.toLocaleDateString(), time: now.toLocaleTimeString([], {hour:"2-digit", minute:"2-digit", second:"2-digit"}), master: activeMaster.name, result: res });
    localStorage.setItem("kb_v19_logs", JSON.stringify(logs));
    renderRecentLogs();
}

function selectMasterFromPullDown() {
    const sel = document.getElementById("master-select");
    const val = sel.value;
    if (val !== "") {
        activeMaster = masters[parseInt(val)];
        document.getElementById("target-info").innerText = activeMaster.name;
    }
    // 選択後、表示を「マスター変更」に戻す
    sel.selectedIndex = 0;
}

function renderMasters() {
    let html = '<option value="" disabled selected>▼ マスター変更</option>';
    html += masters.map((m, i) => `<option value="${i}">${m.name}</option>`).join("");
    document.getElementById("master-select").innerHTML = html;
}

function registerNew() {
    const img = canvas.getImageData(0, 0, canvasElement.width, canvasElement.height);
    const code = jsQR(img.data, img.width, img.height);
    if (!code) return alert("QRコードを認識できません。カメラに向けてください。");
    const name = prompt("製品名/品番を入力:");
    if (name) { masters.push({name: name, code: code.data}); saveMasters(); }
}

function saveMasters() {
    localStorage.setItem("kb_v19_masters", JSON.stringify(masters));
    renderMasters(); renderEditList();
}

function renderEditList() {
    document.getElementById("edit-list").innerHTML = masters.map((m, i) => `
        <div style="border-bottom:2px solid #ddd; padding:15px; display:flex; justify-content:space-between; align-items:center;">
            <b>${m.name}</b>
            <button onclick="deleteMaster(${i})" style="color:red; background:none; border:2px solid red; padding:8px 15px; border-radius:8px;">削除</button>
        </div>
    `).join("");
}

function deleteMaster(i) { if (confirm("削除しますか？")) { masters.splice(i,1); saveMasters(); } }

function renderRecentLogs() {
    const recent = logs.slice(-3).reverse();
    document.getElementById("recent-logs").innerHTML = recent.map(l => `
        <div class="log-item"><span><b style="color:${l.result==='OK'?'#28a745':'#dc3545'}">[${l.result}]</b> ${l.time}</span><span>${l.master}</span></div>
    `).join("");
}

function toggleModal(id) {
    const m = document.getElementById(id);
    m.style.display = (m.style.display === "flex") ? "none" : "flex";
    if (id === "log-modal") renderAnalysis();
}

function renderAnalysis() {
    const stats = {}; let totalOk = 0; let totalNg = 0;
    logs.forEach(l => {
        const key = `${l.date}__${l.master}`;
        if (!stats[key]) stats[key] = { ok: 0, ng: 0 };
        if (l.result === "OK") { stats[key].ok++; totalOk++; } else { stats[key].ng++; totalNg++; }
    });
    let html = `<b>累計：</b> <span style="color:#28a745">OK ${totalOk}</span> / <span style="color:#dc3545">NG ${totalNg}</span><hr>`;
    html += `<table style="width:100%; border-collapse:collapse; font-size:0.9rem;"><tr><th>日付</th><th>製品</th><th>OK</th><th>NG</th></tr>`;
    Object.keys(stats).reverse().forEach(k => {
        const [d, m] = k.split("__");
        html += `<tr style="border-bottom:1px solid #ddd; text-align:center;"><td style="padding:8px">${d}</td><td style="text-align:left">${m}</td><td>${stats[k].ok}</td><td style="color:red">${stats[k].ng}</td></tr>`;
    });
    html += `</table>`;
    document.getElementById("summary-dashboard").innerHTML = html;
    document.getElementById("full-log-list").innerHTML = logs.slice(-30).reverse().map(l => `<div style="padding:5px; border-bottom:1px solid #eee; font-size:0.8rem;">[${l.result}] ${l.date} ${l.time} - ${l.master}</div>`).join("");
}

function clearLogs() { if (confirm("すべての履歴を削除しますか？")) { logs = []; localStorage.setItem("kb_v19_logs", "[]"); renderRecentLogs(); renderAnalysis(); } }

function finishProduction() { activeMaster = null; document.getElementById("target-info").innerText = "未選択"; }

function exportCSV() {
    let csv = "日付,時間,マスター名,結果\n";
    logs.forEach(l => { csv += `${l.date},${l.time},${l.master},${l.result}\n`; });
    const b = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csv], { type: "text/csv" });
    const a = document.createElement("a"); a.href = URL.createObjectURL(b); a.download = `scan_report.csv`; a.click();
}

renderMasters(); renderEditList(); renderRecentLogs();
</script>
</body>
</html>
