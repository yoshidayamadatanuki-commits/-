<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>QR SCANNER PRO v23</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        :root { --safe-area-bottom: env(safe-area-inset-bottom); }
        body { font-family: -apple-system, sans-serif; text-align: center; margin: 0; background: #000; color: white; min-height: 100vh; display: flex; flex-direction: column; overflow: hidden; }
        body.ok { background-color: #28a745 !important; }
        body.ng { background-color: #dc3545 !important; }
        #status-display { font-size: 4rem; font-weight: 900; margin: 5px 0; height: 1.1em; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .video-container { position: relative; width: 60%; max-width: 220px; margin: 0 auto; aspect-ratio: 1/1; border: 3px solid #fff; border-radius: 15px; overflow: hidden; }
        #canvas { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .info-panel { margin: 10px; padding: 10px; background: rgba(255,255,255,0.15); border-radius: 12px; }
        #target-info { font-size: 1.2rem; font-weight: bold; }
        .master-panel { background: #f4f7f9; color: #333; padding: 15px; border-radius: 20px 20px 0 0; flex-grow: 1; overflow-y: auto; }
        .master-item { display: flex; justify-content: space-between; align-items: center; padding: 15px; margin-bottom: 10px; border: 2px solid #ccc; border-radius: 12px; background: white; }
        .master-item.active { border-color: #007bff; background: #eef6ff; outline: 3px solid #007bff; }
        .btn-group { padding: 12px 12px calc(12px + var(--safe-area-bottom)); background: white; border-top: 1px solid #ddd; display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        button { padding: 16px; border-radius: 12px; border: none; font-weight: bold; font-size: 1rem; cursor: pointer; }
        .btn-main { background: #007bff; color: white; box-shadow: 0 4px 0 #0056b3; }
        .btn-sub { background: #555; color: white; box-shadow: 0 4px 0 #333; }
        #start-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a1a; color: white; display: flex; justify-content: center; align-items: center; z-index: 2000; font-size: 1.5rem; font-weight: bold; text-align: center; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; color: #333; z-index: 500; flex-direction: column; }
    </style>
</head>
<body>
    <div id="start-overlay" onclick="startApp()">タップして開始<br><small style="font-size:0.8rem; opacity:0.7;">(音声を有効にします)</small></div>
    <div id="status-display">READY</div>
    <div class="video-container"><canvas id="canvas"></canvas></div>
    <div class="info-panel"><div id="target-info">生産中：マスター未選択</div></div>
    <div class="master-panel"><div id="master-container"></div></div>
    
    <div class="btn-group">
        <button class="btn-main" onclick="toggleModal('mgmt-modal')">⚙ 設定</button>
        <button class="btn-sub" onclick="toggleModal('log-modal')">📊 履歴</button>
    </div>

    <div id="mgmt-modal" class="modal">
        <div style="padding:20px; flex-grow:1; overflow-y:auto;">
            <h3>マスター設定</h3>
            <button class="btn-main" style="width:100%; margin-bottom:15px;" onclick="registerNew()">＋ QR登録</button>
            <div id="edit-list"></div>
        </div>
        <div style="padding:15px; border-top:1px solid #ddd;"><button class="btn-sub" style="width:100%;" onclick="toggleModal('mgmt-modal')">閉じる</button></div>
    </div>

    <div id="log-modal" class="modal">
        <div style="padding:20px; flex-grow:1; overflow-y:auto;">
            <h3>集計・履歴</h3>
            <div id="summary-area" style="background:#eef6ff; padding:15px; border-radius:12px; margin-bottom:15px;">
                <div id="summary-list"></div>
            </div>
            <div id="log-list"></div>
        </div>
        <div style="padding:15px; border-top:1px solid #ddd;">
            <button style="width:100%; color:red; margin-bottom:10px; background:none; border:1px solid red; padding:10px; border-radius:8px;" onclick="clearLogs()">履歴リセット</button>
            <button class="btn-sub" style="width:100%;" onclick="toggleModal('log-modal')">閉じる</button>
        </div>
    </div>

    <script>
        const video = document.createElement("video");
        const canvasElement = document.getElementById("canvas");
        const canvas = canvasElement.getContext("2d", { alpha: false });
        
        // ★音声エンジンの改良
        let audioCtx;
        function initAudio() {
            if (!audioCtx) {
                audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            }
        }

        function playBeep(type) {
            if (!audioCtx) return;
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            osc.connect(gain);
            gain.connect(audioCtx.destination);

            const now = audioCtx.currentTime;

            if (type === 'ok') {
                // 【ピンポーン】 2音構成
                osc.type = 'sine';
                osc.frequency.setValueAtTime(660, now); // ミ
                osc.frequency.setValueAtTime(523.25, now + 0.15); // ド
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.5);
                osc.start(now);
                osc.stop(now + 0.5);
            } else {
                // 【ブブー】 低い矩形波
                osc.type = 'square';
                osc.frequency.setValueAtTime(110, now); // ラ
                gain.gain.setValueAtTime(0.1, now);
                gain.gain.exponentialRampToValueAtTime(0.01, now + 0.4);
                osc.start(now);
                osc.stop(now + 0.4);
            }
        }

        let currentQR = ""; 
        let activeMaster = null;
        let masters = JSON.parse(localStorage.getItem("kb_v19_masters")) || [];
        let logs = JSON.parse(localStorage.getItem("kb_v19_logs")) || [];
        let isProcessing = false;

        function startApp() {
            initAudio(); // 音声初期化
            document.getElementById("start-overlay").style.display = "none";
            navigator.mediaDevices.getUserMedia({ video: { facingMode: "user", width: 1280, height: 1280 } }).then(s => {
                video.srcObject = s; video.setAttribute("playsinline", true); video.play();
                requestAnimationFrame(tick);
            });
        }

        function tick() {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                canvasElement.height = video.videoHeight;
                canvasElement.width = video.videoWidth;
                canvas.drawImage(video, 0, 0, canvasElement.width, canvasElement.height);
                const imageData = canvas.getImageData(0, 0, canvasElement.width, canvasElement.height);
                const code = jsQR(imageData.data, canvasElement.width, canvasElement.height);

                if (code) {
                    currentQR = code.data;
                    if (!isProcessing && activeMaster && document.querySelectorAll('.modal[style*="flex"]').length === 0) {
                        isProcessing = true;
                        const isOk = (currentQR === activeMaster.code);
                        playBeep(isOk ? 'ok' : 'ng');
                        updateStatus(isOk);
                        saveLog(isOk ? "OK" : "NG");
                    }
                }
            }
            requestAnimationFrame(tick);
        }

        function updateStatus(isOk) {
            document.getElementById("status-display").innerText = isOk ? "OK" : "NG";
            document.body.className = isOk ? "ok" : "ng";
            setTimeout(() => {
                document.getElementById("status-display").innerText = "READY";
                document.body.className = "";
                isProcessing = false;
            }, 1500);
        }

        function saveLog(res) {
            const now = new Date();
            logs.push({ date: now.toLocaleDateString(), time: now.toLocaleTimeString([], {hour:'2-digit', minute:'2-digit'}), master: activeMaster.name, result: res });
            localStorage.setItem("kb_v19_logs", JSON.stringify(logs));
        }

        function selectMaster(i) {
            if (confirm(`「${masters[i].name}」の照合を開始しますか？`)) {
                activeMaster = masters[i];
                document.getElementById("target-info").innerText = `生産中：${activeMaster.name}`;
                renderMasters();
            }
        }

        function renderMasters() {
            document.getElementById("master-container").innerHTML = masters.map((m, i) => `
                <div class="master-item ${activeMaster && m.name===activeMaster.name?'active':''}" onclick="selectMaster(${i})">
                    <b>${m.name}</b><span>${activeMaster && m.name===activeMaster.name?'生産中':'選択'}</span>
                </div>
            `).join('');
        }

        function registerNew() {
            if (!currentQR) return alert("QRを映してください");
            const name = prompt("製品名:");
            if (name) { masters.push({ name, code: currentQR }); saveMasters(); }
        }

        function saveMasters() {
            localStorage.setItem("kb_v19_masters", JSON.stringify(masters));
            renderMasters(); renderEditList();
        }

        function renderEditList() {
            document.getElementById("edit-list").innerHTML = masters.map((m, i) => `
                <div style="border:1px solid #ccc; padding:10px; margin-top:10px; border-radius:8px;">
                    <b>${m.name}</b><br><button onclick="deleteMaster(${i})" style="color:red; background:none; border:none; padding:5px;">削除</button>
                </div>
            `).join('');
        }

        function deleteMaster(i) { if(confirm("削除？")) { masters.splice(i, 1); saveMasters(); } }

        function toggleModal(id) {
            const m = document.getElementById(id);
            m.style.display = (m.style.display === "flex") ? "none" : "flex";
            if (id === 'log-modal') renderLogs();
        }

        function renderLogs() {
            const summaryMap = {};
            let totalOk = 0;
            logs.forEach(l => { if (l.result === "OK") { totalOk++; const key = `${l.date} [${l.master}]`; summaryMap[key] = (summaryMap[key] || 0) + 1; } });
            document.getElementById("summary-list").innerHTML = `<b>総OK：${totalOk}件</b><hr>` + Object.entries(summaryMap).reverse().map(([k, c]) => `<div>${k}: ${c}件</div>`).join('');
            document.getElementById("log-list").innerHTML = logs.slice().reverse().map(l => `<div>[${l.result}] ${l.time} ${l.master}</div>`).join('');
        }

        function clearLogs() { if(confirm("全消去？")) { logs = []; localStorage.setItem("kb_v19_logs", JSON.stringify(logs)); renderLogs(); } }

        renderMasters(); renderEditList();
    </script>
</body>
</html>
