<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>QR SCANNER PRO v38 - FULL OPTION</title>
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        :root { --safe-area-bottom: env(safe-area-inset-bottom); }
        body { margin: 0; font-family: -apple-system, sans-serif; background: #000; color: #fff; display: flex; flex-direction: column; height: 100vh; overflow: hidden; }
        body.ok { background:#28a745 !important; }
        body.ng { background:#dc3545 !important; }
        body.wait { background:#444 !important; }

        /* 判定表示 */
        #status-display { font-size: 8rem; font-weight: 900; height: 1.1em; text-shadow: 6px 6px 12px rgba(0,0,0,0.9); text-align: center; line-height: 1.0; flex-shrink: 0; margin-top: 10px; }
        
        /* 枚数カウンター表示 */
        #count-display { font-size: 2.5rem; font-weight: 900; text-align: center; color: #ffeb3b; text-shadow: 2px 2px 4px #000; margin-bottom: 5px; }

        /* カメラプレビュー */
        .video-container { position: relative; width: 85%; max-width: 380px; aspect-ratio: 1 / 1; border: 5px solid #fff; border-radius: 20px; overflow: hidden; margin: 0 auto 5px; background: #222; flex-shrink: 0; }
        #canvas { width: 100%; height: 100%; object-fit: cover; }
        .mirror { transform: scaleX(-1); } /* 内カメラ用反転スタイル */

        /* カメラ切り替えボタン */
        #camera-switch { position: absolute; top: 10px; right: 10px; background: rgba(0,0,0,0.6); color: white; border: 2px solid #fff; border-radius: 50%; width: 50px; height: 50px; font-size: 1.5rem; display: flex; justify-content: center; align-items: center; z-index: 10; cursor: pointer; }
        
        /* 製品名パネル */
        .info-panel { margin: 5px 10px; padding: 10px; background: rgba(255,255,255,0.3); border-radius: 15px; border: 4px solid #fff; text-align: center; flex-shrink: 0; }
        .info-label { font-size: 1.3rem; margin-bottom: 2px; font-weight: bold; color: #eee; }
        #target-info { font-size: 4.2rem; font-weight: 900; line-height: 1.0; word-break: break-all; color: #fff; text-shadow: 3px 3px 8px #000; }

        /* マスター変更プルダウン */
        .master-panel { background:#f4f7f9; color:#333; padding: 12px 15px 5px; border-radius: 20px 20px 0 0; margin-top: auto; }
        #master-select { width: 100%; padding: 20px; font-size: 1.8rem; border-radius: 15px; border: 3px solid #007bff; font-weight: 900; background: #fff; text-align: center; color: #007bff; }

        /* ログエリア */
        .log-display-area { background: #fff; color: #333; height: 115px; overflow: hidden; padding: 0 20px; border-bottom: 1px solid #ddd; }
        .log-item { padding: 6px 0; border-bottom: 1px solid #eee; display: flex; justify-content: space-between; font-weight: bold; font-size: 1.1rem; }

        /* ボタン群 */
        .btn-group { background:#fff; padding: 8px 10px calc(5px + var(--safe-area-bottom)); display:grid; grid-template-columns: 1fr 1fr 1fr; gap:8px; }
        button { padding: 20px 5px; border-radius: 12px; border: none; font-weight: 900; cursor: pointer; font-size: 1.1rem; }
        .btn-main { background:#007bff; color:white; }
        .btn-sub { background:#555; color:white; }
        
        /* NGロック用オーバーレイ */
        #lock-overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(220, 53, 69, 0.98); 
            display: none; flex-direction: column; justify-content: center; align-items: center; 
            z-index: 10000; text-align: center; color: white;
        }
        #lock-overlay h1 { font-size: 6rem; margin: 0; font-weight: 900; }
        #lock-overlay p { font-size: 1.5rem; margin-bottom: 30px; }
        #pw-input { 
            font-size: 3rem; width: 80%; max-width: 300px; padding: 15px; 
            text-align: center; border-radius: 15px; border: none; margin-bottom: 20px;
            -webkit-text-security: disc;
        }
        .btn-unlock { background: white; color: #dc3545; padding: 20px 50px; font-size: 1.5rem; border-radius: 15px; font-weight: 900; }

        #start-overlay { position:fixed; top:0; left:0; width:100%; height:100%; background:#111; display:flex; justify-content:center; align-items:center; z-index:9999; font-size:2rem; font-weight:bold; color:white; }
        .modal { position:fixed; top:0; left:0; width:100%; height:100%; display:none; flex-direction:column; background:#fff; z-index:5000; color:#333; }
        .modal-content { padding: 20px; flex-grow: 1; overflow-y: auto; }
        #mini-canvas { width: 100%; max-width: 320px; transform: scaleX(-1); border-radius: 15px; border: 3px solid #000; }
    </style>
</head>
<body>
    <div id="lock-overlay">
        <h1>NG 発生</h1>
        <p>確認が必要です。パスワードを入力してください。</p>
        <input type="number" id="pw-input" placeholder="****" inputmode="numeric">
        <button class="btn-unlock" onclick="unlock()">解除</button>
    </div>

    <div id="start-overlay" onclick="startApp()">タップして開始</div>
    
    <div id="status-display">READY</div>
    <div id="count-display">読み取り数: 0 枚</div>
    
    <div class="video-container">
        <div id="camera-switch" onclick="switchCamera()">🔄</div>
        <canvas id="canvas"></canvas>
    </div>
    
    <div class="info-panel">
        <div class="info-label">生産中の製品</div>
        <div id="target-info">未選択</div>
    </div>

    <div class="master-panel">
        <select id="master-select" onchange="selectMasterFromPullDown()">
            <option value="" disabled selected>▼ マスター変更</option>
        </select>
    </div>

    <div class="log-display-area" id="recent-logs"></div>

    <div class="btn-group">
        <button class="btn-main" onclick="toggleModal('mgmt-modal')">⚙ 設定</button>
        <button class="btn-sub" onclick="toggleModal('log-modal')">📊 集計</button>
        <button class="btn-sub" onclick="confirmFinish()" style="background:#b40000;">■ 終了</button>
    </div>

    <div id="mgmt-modal" class="modal">
        <div class="modal-content">
            <h2>マスター登録・削除</h2>
            <div style="padding:15px;background:#eee;border-radius:15px;text-align:center;margin-bottom:20px;">
                <canvas id="mini-canvas"></canvas>
                <button class="btn-main" style="width:100%; margin-top:15px; padding:20px;" onclick="registerNew()">今のQRを登録</button>
            </div>
            <div id="edit-list"></div>
        </div>
        <div style="padding:20px; border-top:1px solid #ddd;">
            <button class="btn-sub" style="width:100%; padding:20px;" onclick="toggleModal('mgmt-modal')">閉じる</button>
        </div>
    </div>

    <div id="log-modal" class="modal">
        <div class="modal-content">
            <h2>判定集計・履歴</h2>
            <div id="summary-dashboard" style="background:#eef6ff;padding:15px;border-radius:12px;margin-bottom:20px;"></div>
            <div id="full-log-list"></div>
        </div>
        <div style="padding:20px;">
            <button onclick="exportCSV()" style="width:100%;background:#008800;color:white;padding:18px;border-radius:10px;margin-bottom:12px; font-weight:bold;">📤 CSV出力</button>
            <button onclick="clearLogs()" style="width:100%;background:none;color:red;border:2px solid red;padding:15px;border-radius:10px;margin-bottom:12px; font-weight:bold;">⚠️ 履歴リセット</button>
            <button class="btn-sub" style="width:100%; padding:18px;" onclick="toggleModal('log-modal')">閉じる</button>
        </div>
    </div>

<script>
const UNLOCK_PASSWORD = "8181";
const SCAN_INTERVAL_MS = 30000;
const ANALYSIS_INTERVAL = 200; // QR解析を行う間隔（ミリ秒）: 200ms = 秒間5回

const video = document.createElement("video");
const canvasElement = document.getElementById("canvas");
const canvas = canvasElement.getContext("2d", { willReadFrequently: true });
const miniCanvasElement = document.getElementById("mini-canvas");
const miniCanvas = miniCanvasElement.getContext("2d");
let audioCtx;
let isLocked = false;
let isInterval = false;
let currentFacingMode = "user"; // "user" または "environment"
let okCount = 0; // 現在の読み取り枚数
let lastAnalysisTime = 0; // 最後に解析した時刻を記録

function playBeep(type) {
    if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
    if (audioCtx.state === "suspended") audioCtx.resume();
    const now = audioCtx.currentTime;
    if (type === "ok") {
        const g = audioCtx.createGain(); g.connect(audioCtx.destination);
        const o1 = audioCtx.createOscillator(); o1.type = "triangle";
        o1.frequency.setValueAtTime(1046.50, now); g.gain.setValueAtTime(0.3, now);
        o1.connect(g); o1.start(now); o1.stop(now + 0.12);
        const o2 = audioCtx.createOscillator(); o2.type = "triangle";
        o2.frequency.setValueAtTime(880, now + 0.15); g.gain.setValueAtTime(0.3, now + 0.15);
        o2.connect(g); o2.start(now + 0.15); o2.stop(now + 0.6);
    } else {
        [0, 0.22].forEach(delay => {
            [150, 180].forEach(f => {
                const o = audioCtx.createOscillator(); const g = audioCtx.createGain();
                o.type='square'; o.frequency.setValueAtTime(f, now + delay);
                g.gain.setValueAtTime(0.5, now + delay);
                g.gain.linearRampToValueAtTime(0, now + delay + 0.25);
                o.connect(g); g.connect(audioCtx.destination);
                o.start(now + delay); o.stop(now + delay + 0.25);
            });
        });
    }
}

let masters = JSON.parse(localStorage.getItem("kb_v19_masters")) || [];
let logs = JSON.parse(localStorage.getItem("kb_v19_logs")) || [];
let activeMaster = null;
let isProcessing = false;
let lastSeenQR = "";
let seenCount = 0;

async function startApp() {
    document.getElementById("start-overlay").style.display = "none";
    await initCamera();
}

async function initCamera() {
    if (video.srcObject) {
        video.srcObject.getTracks().forEach(track => track.stop());
    }
    const constraints = { video: { facingMode: currentFacingMode, width: 1280, height: 1280 } };
    try {
        const s = await navigator.mediaDevices.getUserMedia(constraints);
        video.srcObject = s;
        video.setAttribute("playsinline", true);
        video.play();
        
        // 内カメラ(user)のときだけ反転表示
        if (currentFacingMode === "user") {
            canvasElement.classList.add("mirror");
        } else {
            canvasElement.classList.remove("mirror");
        }
        
        requestAnimationFrame(tick);
    } catch (err) {
        alert("カメラの起動に失敗しました: " + err);
    }
}

function switchCamera() {
    currentFacingMode = (currentFacingMode === "user") ? "environment" : "user";
    initCamera();
}

function tick() {
    if (video.readyState === video.HAVE_ENOUGH_DATA) {
        canvasElement.width = video.videoWidth; canvasElement.height = video.videoHeight;
        // 映像の描画は常に実行（これでプレビューが滑らかになる）
        canvas.drawImage(video, 0, 0, canvasElement.width, canvasElement.height);
        
        if (document.getElementById('mgmt-modal').style.display === 'flex') {
            miniCanvasElement.width = 400; miniCanvasElement.height = 400;
            miniCanvas.drawImage(video, 0, 0, 400, 400);
        }

        const now = Date.now();
        // ANALYSIS_INTERVAL (200ms) ごとにのみQR解析を実行
        if (now - lastAnalysisTime > ANALYSIS_INTERVAL) {
            lastAnalysisTime = now;
            
            const img = canvas.getImageData(0, 0, canvasElement.width, canvasElement.height);
            const code = jsQR(img.data, img.width, img.height, { inversionAttempts: "dontInvert" });
            
            if (code && code.data.trim() !== "") {
                if (code.data === lastSeenQR) { seenCount++; } else { lastSeenQR = code.data; seenCount = 1; }
                if (seenCount >= 2) {
                    if (!isProcessing && !isLocked && !isInterval && activeMaster && document.getElementById("mgmt-modal").style.display !== "flex") {
                        isProcessing = true;
                        const ok = (code.data === activeMaster.code);
                        playBeep(ok ? "ok" : "ng");
                        updateStatus(ok);
                        saveLog(ok ? "OK" : "NG");
                        seenCount = 0; lastSeenQR = "";
                    }
                }
            } else { seenCount = 0; lastSeenQR = ""; }
        }
    }
    requestAnimationFrame(tick);
}

function updateStatus(ok) {
    if (ok) {
        okCount++;
        updateCountDisplay();
        document.body.className = "ok";
        document.getElementById("status-display").innerText = "OK";
        
        setTimeout(() => {
            isInterval = true;
            isProcessing = false;
            document.body.className = "wait";
            document.getElementById("status-display").innerText = "WAIT";
            
            setTimeout(() => {
                isInterval = false;
                document.body.className = "";
                document.getElementById("status-display").innerText = "READY";
            }, SCAN_INTERVAL_MS);
            
        }, 1200);

    } else {
        document.body.className = "ng";
        document.getElementById("status-display").innerText = "NG";
        isLocked = true;
        setTimeout(() => {
            document.getElementById("lock-overlay").style.display = "flex";
            document.getElementById("pw-input").focus();
        }, 500);
    }
}

function updateCountDisplay() {
    document.getElementById("count-display").innerText = `読み取り数: ${okCount} 枚`;
}

function resetCount() {
    okCount = 0;
    updateCountDisplay();
}

function unlock() {
    const input = document.getElementById("pw-input").value;
    if (input === UNLOCK_PASSWORD) {
        isLocked = false;
        isProcessing = false;
        document.getElementById("lock-overlay").style.display = "none";
        document.getElementById("pw-input").value = "";
        document.body.className = "";
        document.getElementById("status-display").innerText = "READY";
    } else {
        alert("パスワードが違います");
        document.getElementById("pw-input").value = "";
    }
}

function saveLog(res) {
    const now = new Date();
    logs.push({ date: now.toLocaleDateString(), time: now.toLocaleTimeString([], {hour:"2-digit", minute:"2-digit", second:"2-digit"}), master: activeMaster.name, result: res });
    localStorage.setItem("kb_v19_logs", JSON.stringify(logs));
    renderRecentLogs();
}

function selectMasterFromPullDown() {
    const sel = document.getElementById("master-select");
    const val = sel.value;
    if (val !== "") {
        const targetName = masters[parseInt(val)].name;
        if (confirm(`照合対象を「${targetName}」に変更しますか？\n（読み取り枚数もリセットされます）`)) {
            activeMaster = masters[parseInt(val)];
            document.getElementById("target-info").innerText = activeMaster.name;
            isInterval = false;
            document.body.className = "";
            document.getElementById("status-display").innerText = "READY";
            resetCount(); // 枚数リセット
        }
    }
    sel.selectedIndex = 0;
}

function renderMasters() {
    let html = '<option value="" disabled selected>▼ マスター変更</option>';
    html += masters.map((m, i) => `<option value="${i}">${m.name}</option>`).join("");
    document.getElementById("master-select").innerHTML = html;
}

function registerNew() {
    const img = canvas.getImageData(0, 0, canvasElement.width, canvasElement.height);
    const code = jsQR(img.data, img.width, img.height);
    if (!code) return alert("QRをカメラに映してください");
    const name = prompt("品番/製品名を入力:");
    if (name) { masters.push({name: name, code: code.data}); saveMasters(); }
}

function saveMasters() {
    localStorage.setItem("kb_v19_masters", JSON.stringify(masters));
    renderMasters(); renderEditList();
}

function renderEditList() {
    document.getElementById("edit-list").innerHTML = masters.map((m, i) => `
        <div style="border-bottom:2px solid #ddd; padding:15px; display:flex; justify-content:space-between; align-items:center;">
            <b style="font-size:1.4rem;">${m.name}</b>
            <button onclick="deleteMaster(${i})" style="color:red; background:none; border:2px solid red; padding:10px 15px; border-radius:8px; font-weight:bold;">削除</button>
        </div>
    `).join("");
}

function deleteMaster(i) { if (confirm("削除しますか？")) { masters.splice(i,1); saveMasters(); } }

function renderRecentLogs() {
    const recent = logs.slice(-3).reverse();
    document.getElementById("recent-logs").innerHTML = recent.map(l => `
        <div class="log-item"><span><b style="color:${l.result==='OK'?'#28a745':'#dc3545'}">[${l.result}]</b> ${l.time}</span><span>${l.master}</span></div>
    `).join("") || '<div style="color:#999; text-align:center; padding-top:40px;">履歴なし</div>';
}

function toggleModal(id) {
    if (isLocked) return;
    const m = document.getElementById(id);
    m.style.display = (m.style.display === "flex") ? "none" : "flex";
    if (id === "log-modal") renderAnalysis();
}

function renderAnalysis() {
    const stats = {}; let totalOk = 0; let totalNg = 0;
    logs.forEach(l => {
        const key = `${l.date}__${l.master}`;
        if (!stats[key]) stats[key] = { ok: 0, ng: 0 };
        if (l.result === "OK") { stats[key].ok++; totalOk++; } else { stats[key].ng++; totalNg++; }
    });
    let html = `<b>累計：</b> <span style="color:#28a745">OK ${totalOk}</span> / <span style="color:#dc3545">NG ${totalNg}</span><hr>`;
    html += `<table style="width:100%; border-collapse:collapse; font-size:1.1rem;"><tr><th>日付</th><th>製品</th><th>OK</th><th>NG</th></tr>`;
    Object.keys(stats).reverse().forEach(k => {
        const [d, m] = k.split("__");
        html += `<tr style="border-bottom:1px solid #ddd; text-align:center;"><td style="padding:10px">${d}</td><td style="text-align:left">${m}</td><td>${stats[k].ok}</td><td style="color:red">${stats[k].ng}</td></tr>`;
    });
    html += `</table>`;
    document.getElementById("summary-dashboard").innerHTML = html;
    document.getElementById("full-log-list").innerHTML = logs.slice(-30).reverse().map(l => `<div style="padding:10px; border-bottom:1px solid #eee; font-size:1rem;">[${l.result}] ${l.date} ${l.time} - ${l.master}</div>`).join("");
}

function clearLogs() { if (confirm("履歴を削除しますか？")) { logs = []; localStorage.setItem("kb_v19_logs", "[]"); renderRecentLogs(); renderAnalysis(); } }

function confirmFinish() {
    if (isLocked) return;
    if (confirm("生産を終了しますか？\n（読み取り枚数もリセットされます）")) {
        activeMaster = null;
        isInterval = false;
        document.getElementById("target-info").innerText = "未選択";
        document.body.className = "";
        document.getElementById("status-display").innerText = "READY";
        resetCount(); // 枚数リセット
    }
}

function exportCSV() {
    let csv = "日付,時間,マスター名,結果\n";
    logs.forEach(l => { csv += `${l.date},${l.time},${l.master},${l.result}\n`; });
    const b = new Blob([new Uint8Array([0xEF, 0xBB, 0xBF]), csv], { type: "text/csv" });
    const a = document.createElement("a"); a.href = URL.createObjectURL(b); a.download = `scan_report.csv`; a.click();
}

renderMasters(); renderEditList(); renderRecentLogs();
</script>
</body>
</html>
