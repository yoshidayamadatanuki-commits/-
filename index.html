<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>QR SCANNER PRO v18 (高画質・内カメラ版)</title>
    <link rel="manifest" href="manifest.json">
    <link rel="apple-touch-icon" href="icon-192.png">
    
    <script src="https://cdn.jsdelivr.net/npm/jsqr@1.4.0/dist/jsQR.min.js"></script>
    <style>
        body { font-family: -apple-system, "Helvetica Neue", Arial, sans-serif; text-align: center; margin: 0; background: #000; overflow: hidden; color: white; min-height: 100vh; display: flex; flex-direction: column; }
        body.ok { background-color: #28a745 !important; }
        body.ng { background-color: #dc3545 !important; }
        #status-display { font-size: 5rem; font-weight: 900; margin: 10px 0; height: 1.2em; line-height: 1.2; text-shadow: 2px 2px 4px rgba(0,0,0,0.5); }
        .video-container { position: relative; width: 85%; max-width: 320px; margin: 0 auto; aspect-ratio: 1/1; border: 4px solid #fff; border-radius: 20px; overflow: hidden; background: #222; }
        #canvas { width: 100%; height: 100%; object-fit: cover; transform: scaleX(-1); }
        .scan-guide { position: absolute; top: 50%; left: 50%; width: 65%; height: 65%; border: 2px dashed rgba(255,255,255,0.7); transform: translate(-50%, -50%); pointer-events: none; border-radius: 12px; }
        .info-panel { margin: 15px 10px; padding: 15px; background: rgba(255,255,255,0.15); border-radius: 15px; backdrop-filter: blur(10px); }
        #target-info { font-size: 1.5rem; font-weight: bold; }
        .master-panel { background: #f4f7f9; color: #333; padding: 15px; border-radius: 25px 25px 0 0; flex-grow: 1; overflow-y: auto; }
        .master-item { display: flex; justify-content: space-between; align-items: center; padding: 18px; margin-bottom: 12px; border: 2px solid #ccc; border-radius: 15px; background: white; }
        .master-item.active { border-color: #007bff; background: #eef6ff; outline: 3px solid #007bff; }
        .btn-group { padding: 12px; background: white; display: grid; grid-template-columns: 1fr 1fr; gap: 10px; }
        button { padding: 18px; border-radius: 12px; border: none; font-weight: bold; font-size: 1rem; }
        .btn-main { background: #007bff; color: white; }
        .btn-sub { background: #555; color: white; }
        .modal { display: none; position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #fff; color: #333; z-index: 500; flex-direction: column; }
        #start-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #1a1a1a; color: white; display: flex; justify-content: center; align-items: center; z-index: 2000; font-size: 1.8rem; font-weight: bold; }
    </style>
</head>
<body>
    <div id="start-overlay" onclick="startApp()">タップしてスキャン開始</div>
    <div id="status-display">READY</div>
    <div class="video-container">
        <canvas id="canvas"></canvas>
        <div class="scan-guide"></div>
    </div>
    <div class="info-panel"><div id="target-info">生産中：マスター未選択</div></div>
    <div class="master-panel"><div id="master-container"></div></div>
    <div class="btn-group">
        <button class="btn-main" style="grid-column: span 2;" onclick="toggleModal('mgmt-modal')">⚙ 設定 / 登録</button>
    </div>

    <div id="mgmt-modal" class="modal">
        <div style="padding:20px;">
            <h3>マスター設定</h3>
            <button class="btn-main" style="width:100%; margin-bottom:12px;" onclick="registerNew()">＋ QRを登録</button>
            <div id="edit-list"></div>
            <button class="btn-sub" style="width:100%; margin-top:20px;" onclick="toggleModal('mgmt-modal')">閉じる</button>
        </div>
    </div>

    <script>
        const video = document.createElement("video");
        const canvasElement = document.getElementById("canvas");
        const canvas = canvasElement.getContext("2d", { alpha: false, willReadFrequently: true });
        let currentQR = ""; 
        let activeMaster = null;
        let masters = JSON.parse(localStorage.getItem("kb_v19_masters")) || [];
        let isProcessing = false;

        function startApp() {
            document.getElementById("start-overlay").style.display = "none";
            // 解像度を1280x720以上に指定（スマホの性能に合わせる）
            const constraints = { 
                video: { 
                    facingMode: "user", 
                    width: { ideal: 1920 }, 
                    height: { ideal: 1080 } 
                } 
            };
            navigator.mediaDevices.getUserMedia(constraints).then(s => {
                video.srcObject = s;
                video.setAttribute("playsinline", true);
                video.play();
                requestAnimationFrame(tick);
            });
        }

        function tick() {
            if (video.readyState === video.HAVE_ENOUGH_DATA) {
                // キャンバス自体の解像度を高く保つ
                canvasElement.height = video.videoHeight;
                canvasElement.width = video.videoWidth;
                canvas.drawImage(video, 0, 0, canvasElement.width, canvasElement.height);

                const imageData = canvas.getImageData(0, 0, canvasElement.width, canvasElement.height);
                const code = jsQR(imageData.data, canvasElement.width, canvasElement.height, {
                    inversionAttempts: "dontInvert",
                });

                if (code) {
                    currentQR = code.data;
                    if (!isProcessing && activeMaster) {
                        isProcessing = true;
                        const isOk = (currentQR === activeMaster.code);
                        updateStatus(isOk);
                    }
                }
            }
            requestAnimationFrame(tick);
        }

        function updateStatus(isOk) {
            document.getElementById("status-display").innerText = isOk ? "OK" : "NG";
            document.body.className = isOk ? "ok" : "ng";
            setTimeout(() => {
                document.getElementById("status-display").innerText = "READY";
                document.body.className = "";
                isProcessing = false;
            }, 1500);
        }

        function registerNew() {
            if (!currentQR) return alert("QRが認識されていません");
            const name = prompt("製品名:", "");
            if (name) { masters.push({ name: name, code: currentQR }); saveMasters(); }
        }

        function saveMasters() {
            localStorage.setItem("kb_v19_masters", JSON.stringify(masters));
            renderMasters();
        }

        function renderMasters() {
            document.getElementById("master-container").innerHTML = masters.map((m, i) => `
                <div class="master-item ${activeMaster && m.name===activeMaster.name?'active':''}" onclick="selectMaster(${i})">
                    <b>${m.name}</b>
                </div>
            `).join('');
        }

        function selectMaster(i) {
            activeMaster = masters[i];
            document.getElementById("target-info").innerText = `生産中：${activeMaster.name}`;
            renderMasters();
        }

        function toggleModal(id) {
            const m = document.getElementById(id);
            m.style.display = m.style.display === "flex" ? "none" : "flex";
        }

        renderMasters();
    </script>
</body>
</html>
